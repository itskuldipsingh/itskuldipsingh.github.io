<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITI Virtual Electrical Lab - Master Project</title>
    <style>
        :root {
            --primary: #1a73e8; --secondary: #2c3e50; --danger: #d93025; --success: #1e8e3e; --warning: #f1c40f;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background: #f0f2f5; height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        .sidebar { width: 280px; background: var(--secondary); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.3); z-index: 100; }
        .sidebar h2 { padding: 20px; text-align: center; background: rgba(0,0,0,0.2); margin: 0; font-size: 1.2rem; border-bottom: 1px solid #444; }
        .nav-btn { padding: 15px 20px; cursor: pointer; border: none; background: none; color: #bdc3c7; text-align: left; font-size: 15px; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-btn.active { background: var(--primary); color: white; border-left: 4px solid #fff; font-weight: bold; }

        /* Main Content Area */
        .main { flex: 1; height: 100vh; overflow-y: auto; padding: 25px; box-sizing: border-box; position: relative; }
        .sim-container { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; max-width: 900px; margin: 0 auto; }
        .sim-container.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* Canvas & Controls */
        canvas { background: #fff; border: 2px solid #333; border-radius: 15px; width: 100%; display: block; margin: 20px auto; cursor: crosshair; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .display { background: #222; color: #0f0; padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 18px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        input[type=range] { width: 100%; cursor: pointer; }
        .action-btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: white; transition: 0.2s; }

        /* Switch UI */
        .switch-box { width: 50px; height: 80px; background: #ddd; border-radius: 8px; position: relative; margin: 10px auto; cursor: pointer; border: 3px solid #999; }
        .lever { width: 30px; height: 35px; background: #e74c3c; position: absolute; left: 10px; transition: 0.3s; border-radius: 4px; }
        .lever.on { top: 8px; background: #2ecc71; }
        .lever.off { top: 35px; }

        /* Multimeter Overlay */
        .multimeter { position: fixed; bottom: 20px; right: 20px; width: 160px; height: 230px; background: #f1c40f; border: 4px solid #d4ac0d; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); padding: 10px; text-align: center; z-index: 1000; }
        .meter-screen { background: #9bb19b; height: 40px; border: 2px solid #7d8e7d; border-radius: 5px; font-family: monospace; font-size: 20px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>⚡ ITI Virtual Lab</h2>
    <button class="nav-btn active" onclick="openSim('sim_ohms', this)">📐 ओह्म का नियम</button>
    <button class="nav-btn" onclick="openSim('sim_kirchhoff', this)">⚖️ किरचॉफ के नियम</button>
    <button class="nav-btn" onclick="openSim('sim_wiring', this)">🏠 हाउस वायरिंग</button>
    <button class="nav-btn" onclick="openSim('sim_safety', this)">🔌 सुरक्षा (MCB/RCCB)</button>
    <button class="nav-btn" onclick="openSim('sim_bill', this)">💰 बिल कैलकुलेटर</button>
</div>

<div class="main">
    <div id="sim_ohms" class="sim-container active">
        <h1>Ohm's Law: Stress Test</h1>
        <div class="controls">
            <div>
                <label>Voltage: <b id="v1_val">12V</b></label>
                <input type="range" id="v1_range" min="0" max="60" value="12" oninput="updateOhms()">
            </div>
            <button class="action-btn" style="background:var(--danger)" onclick="resetOhms()">🛠️ लोड बदलें</button>
        </div>
        <div class="display" id="disp1">करंट: 1.20 A | पावर: 14.4 W</div>
        <canvas id="canvasOhms" width="800" height="350"></canvas>
    </div>

    <div id="sim_kirchhoff" class="sim-container">
        <h1>KCL: Junction Law</h1>
        <div class="controls">
            <div>
                <label>I1 (In): <b id="i1_val">2A</b></label>
                <input type="range" id="i1_range" min="0" max="10" value="2" oninput="updateKCL()">
            </div>
            <div>
                <label>I2 (In): <b id="i2_val">3A</b></label>
                <input type="range" id="i2_range" min="0" max="10" value="3" oninput="updateKCL()">
            </div>
        </div>
        <div class="display" id="disp_kcl">I1 + I2 = I_total</div>
        <canvas id="canvasKCL" width="800" height="350"></canvas>
    </div>

    <div id="sim_wiring" class="sim-container">
        <h1>Advanced House Wiring</h1>
        <div class="controls">
            <select id="wiring_mode" onchange="initWiring()" style="padding:10px; grid-column: span 2;">
                <option value="staircase">Staircase (2-Way Control)</option>
                <option value="godown">Godown Wiring (वन-बाय-वन)</option>
            </select>
            <div id="switches_ui" style="grid-column: span 2; display: flex; justify-content: space-around;"></div>
        </div>
        <div class="display" id="disp_wiring">बल्ब: OFF</div>
        <canvas id="canvasWiring" width="800" height="350"></canvas>
    </div>

    <div id="sim_safety" class="sim-container">
        <h1>Safety (MCB & RCCB Protection)</h1>
        <div class="controls">
            <div style="text-align:center"><label>MCB</label><div class="switch-box" onclick="toggleSafety('mcb')"><div id="mcb_lever" class="lever on"></div></div></div>
            <div style="text-align:center"><label>RCCB</label><div class="switch-box" onclick="toggleSafety('rccb')"><div id="rccb_lever" class="lever on"></div></div></div>
        </div>
        <button class="action-btn" style="width:100%; background:orange;" onmousedown="triggerShock()" onmouseup="stopShock()">⚡ लाइव वायर को छुएं (Shock Test)</button>
        <div class="display" id="disp_safety" style="margin-top:20px;">सिस्टम सुरक्षित है।</div>
        <canvas id="canvasSafety" width="800" height="350"></canvas>
    </div>

    <div id="sim_bill" class="sim-container">
        <h1>Energy Bill Calculator</h1>
        <div class="controls">
            <div><label>Load (Watts):</label><input type="number" id="bill_watts" value="1000" oninput="calculateBill()"></div>
            <div><label>Hours/Day: <b id="hr_val">5</b></label><input type="range" id="bill_hrs" min="1" max="24" value="5" oninput="calculateBill()"></div>
        </div>
        <div class="display" id="disp_bill" style="text-align: center; color: var(--warning);">₹ 0.00</div>
    </div>
</div>

<div class="multimeter">
    <div style="font-size: 10px; color: #333; font-weight: bold;">MULTIMETER</div>
    <div class="meter-screen" id="meter_out">0.00</div>
    <div style="margin-top: 10px; font-size: 11px;">Mouse over wire to measure</div>
    <div style="width: 35px; height: 35px; background: #333; border-radius: 50%; margin: 10px auto; border: 3px solid #555;"></div>
    <div style="color: red; font-weight: bold; font-size: 12px;">V / A</div>
</div>

<script>
    let activeSim = 'sim_ohms';
    let mouseX = 0, mouseY = 0;
    let isBurned = false, smoke = [];
    let mcbOn = true, rccbOn = true, isShocking = false;
    let s1 = false, s2 = false;

    // Mouse Tracking
    document.addEventListener('mousemove', (e) => {
        const canvas = document.querySelector('.sim-container.active canvas');
        if(!canvas) return;
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        updateMeter();
    });

    function openSim(id, btn) {
        document.querySelectorAll('.sim-container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        activeSim = id;
    }

    function updateMeter() {
        let val = 0;
        if(activeSim === 'sim_ohms' && !isBurned) {
            if(mouseY < 100 && mouseX > 100 && mouseX < 600) val = document.getElementById('v1_range').value;
        }
        document.getElementById('meter_out').innerText = parseFloat(val).toFixed(2);
    }

    // Logic Functions
    function updateOhms() {
        const v = parseFloat(document.getElementById('v1_range').value);
        if(v > 48) isBurned = true;
        document.getElementById('v1_val').innerText = v + "V";
        document.getElementById('disp1').innerHTML = `Current: ${(isBurned?0:v/10).toFixed(2)}A | Power: ${(isBurned?0:(v*v/10)).toFixed(1)}W`;
    }
    function resetOhms() { isBurned = false; document.getElementById('v1_range').value = 12; updateOhms(); }

    function updateKCL() {
        const i1 = parseFloat(document.getElementById('i1_range').value);
        const i2 = parseFloat(document.getElementById('i2_range').value);
        document.getElementById('i1_val').innerText = i1 + "A"; document.getElementById('i2_val').innerText = i2 + "A";
        document.getElementById('disp_kcl').innerText = `I1 + I2 = ${i1+i2}A`;
    }

    function initWiring() {
        const ui = document.getElementById('switches_ui'); ui.innerHTML = '';
        ['S1', 'S2'].forEach(s => {
            ui.innerHTML += `<div style="text-align:center"><label>${s}</label><div class="switch-box" onclick="toggleWiring('${s}')"><div id="${s}_lv" class="lever off"></div></div></div>`;
        });
    }
    function toggleWiring(s) {
        if(s === 'S1') s1 = !s1; else s2 = !s2;
        document.getElementById(s+'_lv').className = (s === 'S1' ? s1 : s2) ? 'lever on' : 'lever off';
        let bulb = (document.getElementById('wiring_mode').value === 'staircase') ? (s1 !== s2) : (s1 && !s2);
        document.getElementById('disp_wiring').innerText = bulb ? "बल्ब: 💡 ON" : "बल्ब: 🌑 OFF";
    }

    function toggleSafety(t) {
        if(t === 'mcb') { mcbOn = !mcbOn; document.getElementById('mcb_lever').className = mcbOn ? 'lever on' : 'lever off'; }
        else { rccbOn = !rccbOn; document.getElementById('rccb_lever').className = rccbOn ? 'lever on' : 'lever off'; }
    }
    function triggerShock() { if(rccbOn) { isShocking = true; setTimeout(() => { rccbOn = false; isShocking = false; toggleSafety('rccb'); }, 150); } }
    function stopShock() {}

    function calculateBill() {
        const w = document.getElementById('bill_watts').value, h = document.getElementById('bill_hrs').value;
        document.getElementById('hr_val').innerText = h;
        document.getElementById('disp_bill').innerText = `महीने का बिल: ₹${((w*h*30/1000)*7).toFixed(2)}`;
    }

    // Animation Loop
    function animate() {
        drawAll();
        requestAnimationFrame(animate);
    }

    function drawAll() {
        // Ohms Canvas
        const ctxO = document.getElementById('canvasOhms').getContext('2d');
        ctxO.clearRect(0,0,800,350);
        ctxO.strokeStyle="#333"; ctxO.lineWidth=5; ctxO.strokeRect(100,80,500,150);
        ctxO.fillStyle = isBurned ? "#222" : "#d93025"; ctxO.fillRect(570,130,60,60);
        if(isBurned) {
            smoke.push({x:600, y:130, a:1});
            smoke.forEach((p,i)=>{ p.y-=1; p.a-=0.02; ctxO.fillStyle=`rgba(100,100,100,${p.a})`; ctxO.beginPath(); ctxO.arc(p.x,p.y,10,0,7); ctxO.fill(); if(p.a<0) smoke.splice(i,1); });
        }

        // KCL Canvas
        const ctxK = document.getElementById('canvasKCL').getContext('2d');
        ctxK.clearRect(0,0,800,350);
        ctxK.beginPath(); ctxK.moveTo(200,100); ctxK.lineTo(400,175); ctxK.lineTo(200,250); ctxK.moveTo(400,175); ctxK.lineTo(600,175); ctxK.stroke();
        ctxK.beginPath(); ctxK.arc(400,175,10,0,7); ctxK.fillStyle="#000"; ctxK.fill();
    }

    animate(); initWiring(); updateOhms(); updateKCL(); calculateBill();
</script>
</body>
</html>
