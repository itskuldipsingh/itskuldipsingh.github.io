<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Component Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #eaeff2; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Meters */
        .header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .digital-meter { background: #000; color: #0f0; padding: 10px 20px; border-radius: 5px; font-family: 'Courier New', monospace; border: 2px solid #555; text-align: center; min-width: 120px; }
        
        .lab-space { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { background: white; border-radius: 15px; box-shadow: inset 0 0 50px rgba(0,0,0,0.05); cursor: pointer; }

        /* Floating Controls */
        .comp-control { position: absolute; background: rgba(255, 255, 255, 0.9); padding: 8px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #ccc; display: flex; flex-direction: column; align-items: center; width: 120px; z-index: 10; transition: 0.3s; }
        .comp-control:hover { transform: scale(1.05); background: white; }
        .comp-control label { font-size: 11px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .comp-control input { width: 100%; cursor: pointer; }
        .comp-control b { color: #1a73e8; font-size: 12px; }

        .reset-btn { position: fixed; bottom: 20px; right: 20px; padding: 12px 25px; background: #d93025; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header">
    <div class="digital-meter">VOLTAGE<br><span id="m_v">0.00</span> V</div>
    <div class="digital-meter">CURRENT<br><span id="m_a">0.00</span> A</div>
    <div class="digital-meter">POWER<br><span id="m_w">0.00</span> W</div>
</div>

<div class="lab-space" id="lab">
    <div class="comp-control" style="left: 10%; top: 40%;">
        <label>DC SOURCE</label>
        <input type="range" id="v_in" min="0" max="60" value="12" oninput="draw()">
        <b id="v_txt">12V</b>
    </div>

    <div class="comp-control" style="left: 30%; top: 15%;">
        <label>FUSE RATING</label>
        <input type="range" id="f_in" min="1" max="10" value="5" oninput="draw()">
        <b id="f_txt">5A</b>
    </div>

    <div class="comp-control" style="left: 75%; top: 40%;">
        <label>RHEOSTAT (R)</label>
        <input type="range" id="r_in" min="1" max="100" value="15" oninput="draw()">
        <b id="r_txt">15Ω</b>
    </div>

    <canvas id="circuitCanvas" width="900" height="500"></canvas>
</div>

<button class="reset-btn" onclick="resetCircuit()">🛠️ RESET LAB</button>

<script>
    const canvas = document.getElementById('circuitCanvas');
    const ctx = canvas.getContext('2d');
    let sw = true;
    let blown = false;

    // Click to Toggle Switch
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        // Check if clicked near switch area (mid-top)
        if(x > 450 && x < 550 && y > 80 && y < 140) {
            sw = !sw;
            draw();
        }
    });

    function resetCircuit() {
        sw = true; blown = false;
        document.getElementById('v_in').value = 12;
        document.getElementById('r_in').value = 15;
        draw();
    }

    function draw() {
        const V = parseFloat(document.getElementById('v_in').value);
        const R = parseFloat(document.getElementById('r_in').value);
        const F = parseFloat(document.getElementById('f_in').value);
        
        document.getElementById('v_txt').innerText = V + "V";
        document.getElementById('r_txt').innerText = R + "Ω";
        document.getElementById('f_txt').innerText = F + "A";

        let I = sw ? V/R : 0;
        if(I > F) blown = true;
        if(blown) I = 0;

        // Meters
        document.getElementById('m_v').innerText = (sw && !blown ? V : 0).toFixed(2);
        document.getElementById('m_a').innerText = I.toFixed(2);
        document.getElementById('m_w').innerText = (sw && !blown ? V*I : 0).toFixed(2);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const x = 150, y = 100, w = 600, h = 300;
        ctx.strokeStyle = "#333"; ctx.lineWidth = 4;

        // --- Standard Circuit Path ---
        ctx.strokeRect(x, y, w, h);

        // 1. SYMBOL: Battery (DC Source)
        ctx.clearRect(x - 20, y + h/2 - 40, 40, 80);
        for(let i=0; i<3; i++) {
            let offset = i * 20;
            ctx.beginPath(); ctx.moveTo(x-20, y+h/2-25+offset); ctx.lineTo(x+20, y+h/2-25+offset); ctx.stroke(); // Long
            ctx.beginPath(); ctx.lineWidth=8; ctx.moveTo(x-10, y+h/2-15+offset); ctx.lineTo(x+10, y+h/2-15+offset); ctx.stroke(); // Short
            ctx.lineWidth=4;
        }

        // 2. SYMBOL: Fuse (IEC)
        const fx = x + 150;
        ctx.clearRect(fx - 30, y - 10, 60, 20);
        ctx.strokeRect(fx - 25, y - 8, 50, 16);
        if(!blown) {
            ctx.beginPath(); ctx.strokeStyle="#e67e22";
            ctx.moveTo(fx-25, y); ctx.bezierCurveTo(fx-10, y-15, fx+10, y+15, fx+25, y); ctx.stroke();
        } else {
            ctx.fillStyle="red"; ctx.fillText("BLOWN", fx-20, y-15);
        }
        ctx.strokeStyle="#333";

        // 3. SYMBOL: Switch (Interactive)
        const sx = x + 350;
        ctx.clearRect(sx - 10, y - 20, 60, 40);
        ctx.beginPath(); ctx.arc(sx, y, 5, 0, 7); ctx.arc(sx+50, y, 5, 0, 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx+5, y);
        if(sw) ctx.lineTo(sx+45, y); else ctx.lineTo(sx+35, y-35);
        ctx.stroke();
        ctx.fillStyle="#666"; ctx.font="10px Arial"; ctx.fillText("CLICK TO TOGGLE", sx, y+25);

        // 4. SYMBOL: Variable Resistor (Zig-Zag)
        const rx = x + w;
        ctx.clearRect(rx - 25, y + h/2 - 50, 50, 100);
        ctx.beginPath(); ctx.moveTo(rx, y+h/2-50);
        for(let i=0; i<8; i++) {
            ctx.lineTo(rx + (i%2==0 ? 20 : -20), y+h/2-40+(i*12));
        }
        ctx.lineTo(rx, y+h/2+50); ctx.stroke();
        // The Arrow
        ctx.beginPath(); ctx.moveTo(rx-30, y+h/2+30); ctx.lineTo(rx+30, y+h/2-30); ctx.stroke();
        ctx.moveTo(rx+22, y+h/2-32); ctx.lineTo(rx+32, y+h/2-28); ctx.stroke();

        // 5. SYMBOL: Lamp (Load)
        const lx = x + w/2;
        ctx.clearRect(lx - 30, y + h - 30, 60, 60);
        ctx.beginPath(); ctx.arc(lx, y+h, 25, 0, 7); ctx.stroke();
        ctx.moveTo(lx-17, y+h-17); ctx.lineTo(lx+17, y+h+17);
        ctx.moveTo(lx+17, y+h-17); ctx.lineTo(lx-17, y+h+17); ctx.stroke();
        
        if(I > 0) {
            ctx.shadowBlur = I * 5; ctx.shadowColor = "yellow";
            ctx.strokeStyle = `rgb(255, ${255-I*10}, 0)`; ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // --- Current Flow (Dots) ---
        if(I > 0) {
            ctx.fillStyle = "#1a73e8";
            let step = (Date.now() / 20) % 40;
            // Draw dots along the path
            for(let i=0; i<w; i+=40) {
                ctx.beginPath(); ctx.arc(x+i+step, y, 3, 0, 7); ctx.fill(); // Top
                ctx.beginPath(); ctx.arc(x+w-i-step, y+h, 3, 0, 7); ctx.fill(); // Bottom
            }
        }
    }

    setInterval(draw, 50);
</script>
</body>
</html>
